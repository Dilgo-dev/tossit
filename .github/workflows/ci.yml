name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          only-new-issues: true

      - name: Build CLI
        run: CGO_ENABLED=0 go build ./cmd/tossit

      - name: Build relay
        run: CGO_ENABLED=0 go build ./cmd/relay

      - name: Test
        run: go test -timeout 30s ./...
