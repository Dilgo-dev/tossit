name: Deploy Relay

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v0.4.0)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ThunderVPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
            curl -fsSL https://github.com/Dilgo-dev/tossit/releases/download/${TAG}/relay-linux-amd64 -o /tmp/tossit-relay
            chmod +x /tmp/tossit-relay
            sudo systemctl stop tossit-relay
            sudo cp /tmp/tossit-relay /usr/local/bin/tossit-relay
            sudo systemctl start tossit-relay
            rm /tmp/tossit-relay
