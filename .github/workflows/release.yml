name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build CLI
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o tossit-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/tossit
      - name: Build relay
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o relay-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/relay
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tossit-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            relay-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Checksums
        run: sha256sum tossit-* relay-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            tossit-*
            relay-*
            checksums.txt
